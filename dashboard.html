<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Issues Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
*{
font-family: "Geist", sans-serif;
}
</style>

</head>

<body class="bg-gray-100">

<section>
    <div class="navbar bg-white shadow px-10">
        <div class="flex-1 flex items-center gap-2">
            <img src="./assets/github-logo.png" class="w-[36px] h-[36px]">
            <h1 class="text-xl font-bold">Issues Tracker</h1>
        </div>
        <div class="flex gap-2">

            <input id="searchInput"
            class="input input-bordered"
            placeholder="Search issues..">

            <button onclick="searchIssue()" class="btn btn-primary">
            <span class="text-xl">+</span>New Issue</button>
        </div>
    </div>
</section>


<section>

    <div class="p-10">
        <div class="tabs tabs-boxed mb-6 shadow bg-white rounded-md space-x-5 py-4">
            <button onclick="changeTab(this,'all')" class="tab tab-active">All </button>
            <button onclick="changeTab(this,'open')" class="tab">Open</button>

            <button onclick="changeTab(this,'closed')" class="tab">Closed</button>
        </div>
        <div class="bg-white p-6 rounded-xl shadow mb-8 flex justify-between items-center">
            <div class="flex items-center gap-4">
            <div class="bg-purple-100 p-2 rounded-full">
                <img src="./assets/Aperture.png" class="w-[50px]">
            </div>
            <div>
                <h2 class="text-2xl font-bold">
                <span id="allCount">0</span>Issues</h2>
                <p class="text-gray-500">Track and manage your project issues</p>
            </div>
            </div>

            <div class="flex gap-6">
                <p class="flex items-center gap-2 text-gray-600">
                <span class="w-3 h-3 bg-green-500 rounded-full"> </span>Open</p>
                <p class="flex items-center gap-2 text-gray-600"><span class="w-3 h-3 bg-purple-500 rounded-full"></span>Closed</p>
            </div>
        </div>




        <div id="loader" class="text-center hidden py-10">
            <span class="loading loading-spinner loading-lg text-blue-500"></span><p>Loading issues...</p>
        </div>

        <div id="issueContainer" class="grid md:grid-cols-4 gap-6">

        </div>
</div>

</section>



<section>

<dialog id="issueModal" class="modal">

<div class="modal-box">

<h3 id="modalTitle" class="font-bold text-lg"></h3>

<p id="modalDesc"></p>

<p id="modalAuthor"></p>

<p id="modalCategory"></p>

<p id="modalPriority"></p>

<p id="modalDate"></p>

<div class="modal-action">

<form method="dialog">

<button class="btn">Close</button>

</form>

</div>

</div>

</dialog>

</section>


<script src="script.js"></script>

</body>
</html>
